services:
  lambda-auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lambda-auth
    restart: unless-stopped
    ports:
      - "25565:25565"   # adjust if the server listens on a different port
    environment:
      - TZ=Europe/Madrid
    networks:
      - proxy

networks:
  proxy:
    external: true
